<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 Cloudflare 测试站点</title>
    <style>
        /* 页面基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .logo {
            font-size: 56px;
            margin-bottom: 12px;
            display: block;
        }

        h1 {
            color: #1a1a2e;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 28px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 20px;
        }

        .status {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            border-left: 4px solid #667eea;
        }

        .status p {
            color: #333;
            font-size: 15px;
            line-height: 1.6;
        }

        .status .highlight {
            color: #667eea;
            font-weight: 600;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: scale(0.95);
        }

        #clickCount {
            display: inline-block;
            font-weight: 700;
            color: #764ba2;
            font-size: 20px;
            min-width: 30px;
        }

        .footer {
            margin-top: 24px;
            font-size: 13px;
            color: #aaa;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="logo">🚀</span>
        <h1>部署成功！</h1>
        <div class="subtitle">你的 Cloudflare Pages 站点已上线</div>

        <div class="status">
            <p>
                ✅ 当前环境：<span class="highlight">生产环境</span><br>
                📅 部署时间：<span id="deployTime"></span>
            </p>
        </div>

        <div>
            <p style="color: #555; margin-bottom: 12px; font-size: 15px;">
                按钮被点击了 <span id="clickCount">0</span> 次
            </p>
            <button id="clickBtn">点我试试 ✨</button>
        </div>

        <div class="footer">
            <span>由 </span>
            <a href="https://pages.cloudflare.com" target="_blank">Cloudflare Pages</a>
            <span> 提供支持</span>
        </div>
    </div>

    <script>
        // 显示当前部署时间
        const now = new Date();
        const timeStr = now.toLocaleString('zh-CN', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        });
        document.getElementById('deployTime').textContent = timeStr;

        // 交互功能：点击计数
        let count = 0;
        const clickBtn = document.getElementById('clickBtn');
        const clickCount = document.getElementById('clickCount');

        clickBtn.addEventListener('click', function() {
            count++;
            clickCount.textContent = count;

            // 按钮反馈动画
            this.style.transform = 'scale(0.95)';
            setTimeout(() => {
                this.style.transform = '';
            }, 150);

            // 计数达到 10 次时给个彩蛋
            if (count === 10) {
                setTimeout(() => {
                    alert('🎉 你已经点击了 10 次！这个页面运行完美！');
                }, 200);
            }
        });

        // 控制台提示
        console.log('✅ Cloudflare Pages 调试页面已加载');
        console.log('📅 部署时间:', timeStr);
    </script>
</body>
</html>
